name: Sync to Google Drive

# Mirrors every JFrog Learn content page into the 'jfrog-learning' Google Drive
# folder as native Google Docs (one Doc per page + an auto-rebuilt index Doc),
# so they can be added as NotebookLM sources.
#
# Runs on every push to main that touches a page, the converter, or this
# workflow. Can also be run manually from the Actions tab.
#
# Pipeline: render each page's CSS/HTML diagrams to PNG with headless Chromium
# (Playwright), build a .docx per page with those images embedded + native Word
# structure, then upload each .docx to Drive and let Drive convert it to a native
# Google Doc. This produces high-fidelity Docs whose diagrams actually render.
#
# Requires a repository secret GOOGLE_OAUTH_CREDENTIALS (OAuth user credentials
# JSON: client_id, client_secret, refresh_token) so the sync acts as you and
# uses your own Drive quota. The app uses the non-sensitive drive.file scope and
# manages its OWN 'jfrog-learning' folder, so DRIVE_FOLDER_ID is optional and is
# normally left unset. No 'documents' scope is needed (images are embedded in the
# .docx before upload). See automation/SETUP.md for the one-time setup.

on:
  push:
    branches: [main]
    paths:
      - "pages/**"
      - "automation/**"
      - ".github/workflows/sync-to-drive.yml"
  workflow_dispatch: {}

# Avoid overlapping runs racing on the same Drive Docs.
concurrency:
  group: sync-to-drive
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: automation/requirements.txt

      - name: Install dependencies
        run: pip install -r automation/requirements.txt

      - name: Install Chromium for Playwright (diagram rendering)
        run: python -m playwright install --with-deps chromium

      - name: Sync pages to Google Drive
        working-directory: automation
        env:
          GOOGLE_OAUTH_CREDENTIALS: ${{ secrets.GOOGLE_OAUTH_CREDENTIALS }}
          DRIVE_FOLDER_ID: ${{ vars.DRIVE_FOLDER_ID }}
          SITE_BASE_URL: https://talorlik.github.io/jfrog-learn
        run: python sync_to_drive.py

      # On failure (most often an expired Google OAuth refresh token), open or
      # reuse a single tracking issue with the exact fix, so a broken sync is
      # loud and actionable instead of silently leaving the Docs stale. Idempotent:
      # if an open issue with the marker label already exists, comment instead of
      # opening a duplicate.
      - name: Open/refresh token-failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          LABEL="drive-sync-broken"
          TITLE="Drive sync failed - refresh the Google OAuth token"
          gh label create "$LABEL" --color B60205 \
            --description "Automated: Drive/NotebookLM sync is failing" 2>/dev/null || true
          # Build the body with printf (no heredoc - avoids YAML indentation
          # pitfalls). %s keeps the run URL safe regardless of its contents.
          printf '%s\n' \
            'The "Sync to Google Drive" workflow failed. The most common cause is an expired Google OAuth refresh token.' \
            '' \
            '**Fix (about 2 minutes):**' \
            '1. `cd automation && ./refresh_token.sh` - opens a browser once for consent, updates the `GOOGLE_OAUTH_CREDENTIALS` secret, and re-runs the sync.' \
            '2. If this keeps happening weekly, publish the OAuth consent screen from "Testing" to "In production" in Google Cloud Console. `drive.file` is non-sensitive, so no verification is required. See `automation/SETUP.md`.' \
            '' \
            "Failed run: ${RUN_URL}" \
            '' \
            'Close this issue by hand once a sync run is green again.' \
            > /tmp/issue_body.md
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --label "$LABEL" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "$GITHUB_REPOSITORY" \
              --body "Sync failed again: ${RUN_URL}"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" --label "$LABEL" --body-file /tmp/issue_body.md
          fi
